<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地狱突围 - 重装版</title>
    <style>
        /* CSS 保持不变，微调了按钮样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #fff; }
        #gameContainer { position: relative; }
        canvas { background-color: #2d2d2d; border: 2px solid #444; cursor: crosshair; display: block; }
        
        /* 开始界面 */
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2d2d2d 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        #gameTitle { font-size: 56px; font-weight: bold; color: #FFD700; text-shadow: 0 0 20px #FFD700; margin-bottom: 20px; }
        #startBtn, #restartBtn { padding: 15px 50px; font-size: 24px; font-weight: bold; background-color: #4CAF50; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 30px; }
        #startBtn:hover, #restartBtn:hover { transform: scale(1.1); box-shadow: 0 0 20px #4CAF50; }
        #controlsHint { margin-top: 40px; text-align: center; color: #aaa; line-height: 2; }

        /* UI 面板样式 */
        #uiTop { position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); display: flex; justify-content: space-between; pointer-events: none; }
        #uiLeft, #uiRight { display: flex; flex-direction: column; gap: 8px; }
        #levelInfo { font-size: 18px; font-weight: bold; color: #FFD700; }
        #killsInfo { font-size: 16px; }
        #healthBarContainer { width: 250px; height: 22px; background-color: #444; border: 1px solid #fff; border-radius: 3px; overflow: hidden; position: relative; }
        #healthBar { width: 100%; height: 100%; background: linear-gradient(90deg, #c62828, #e53935); transition: width 0.2s ease; }
        #healthText { position: absolute; left: 50%; top: 0; transform: translateX(-50%); font-size: 14px; font-weight: bold; line-height: 22px; }
        #expBarContainer { width: 250px; height: 12px; background-color: #333; border: 1px solid #666; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        #expBar { width: 0%; height: 100%; background: linear-gradient(90deg, #42a5f5, #1976d2); transition: width 0.3s ease; }
        #expText { font-size: 12px; margin-top: 2px; }
        
        /* 手枪进化UI */
        #evolutionUI { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; }
        .evoStat { display: flex; flex-direction: column; align-items: center; }
        .evoLabel { font-size: 12px; color: #aaa; }
        .evoValue { font-size: 18px; font-weight: bold; color: #FFD700; }

        #skillIcons { display: flex; gap: 8px; flex-wrap: wrap; max-width: 200px; justify-content: flex-end; }
        .skillIcon { width: 40px; height: 40px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; border: 2px solid #fff; position: relative; }
        .skillLevel { position: absolute; bottom: -5px; right: -5px; background-color: #000; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        #skillSelectModal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 30px; z-index: 100; }
        #skillSelectTitle { font-size: 32px; font-weight: bold; color: #FFD700; }
        #skillCountdown { font-size: 20px; color: #fff; }
        #skillCards { display: flex; gap: 30px; }
        .skillCard { width: 220px; height: 300px; background-color: #2d2d2d; border: 3px solid #555; border-radius: 10px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; cursor: pointer; transition: all 0.2s ease; }
        .skillCard:hover { border-color: #FFD700; transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .skillCardIcon { width: 80px; height: 80px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; color: #fff; }
        .skillCardName { font-size: 20px; font-weight: bold; }
        .skillCardDesc { font-size: 13px; line-height: 1.4; text-align: center; color: #ddd; }
        #levelNotice { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #FFD700; text-shadow: 0 0 20px #000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 50; }
        .floatText { position: absolute; color: #fff; font-weight: bold; pointer-events: none; animation: floatUp 1s forwards; z-index: 60; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- 开始界面 -->
        <div id="startScreen">
            <div id="gameTitle">地狱突围</div>
            <div style="color: #aaa; font-size: 18px;">单武器进化 | 25 关挑战 | 20+ 新BOSS</div>
            <button id="startBtn">开始游戏</button>
            <div id="controlsHint">
                <b>操作指南</b><br>
                WASD 移动 | 鼠标左键 射击<br>
            </div>
        </div>

        <!-- 顶部UI -->
        <div id="uiTop">
            <div id="uiLeft">
                <div id="levelInfo">第1关</div>
                <div id="killsInfo">击杀数: <span id="kills">0</span> / 目标: <span id="killTarget">30</span></div>
                <div id="healthBarContainer">
                    <div id="healthBar"></div>
                    <div id="healthText">10 / 10</div>
                </div>
                <div id="expBarContainer">
                    <div id="expBar"></div>
                </div>
                <div id="expText">等级: 1 | 经验: 0 / 10</div>
            </div>
            <div id="uiRight">
                <div id="skillIcons"></div>
            </div>
        </div>

        <!-- 进化UI -->
        <div id="evolutionUI">
            <div class="evoStat"><div class="evoLabel">弹幕数量</div><div class="evoValue" id="evoBullets">1 / 5</div></div>
            <div class="evoStat"><div class="evoLabel">射速加成</div><div class="evoValue" id="evoSpeed">0%</div></div>
        </div>

        <!-- 技能选择弹窗 -->
        <div id="skillSelectModal">
            <div id="skillSelectTitle">升级！选择一个技能</div>
            <div id="skillCountdown">10秒后自动随机选择</div>
            <div id="skillCards"></div>
        </div>

        <!-- 关卡提示 -->
        <div id="levelNotice"></div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
    </div>

    <script>
        // ===================== 资源配置 =====================
        const RESOURCES = {
            player: 'player.png',
            bullet: 'bullet.png',
            // 为20个新BOSS预留的位置
            bosses: ['boss1.png', 'boss2.png', 'boss3.png', 'boss4.png', 'boss5.png', 
                     'boss6.png', 'boss7.png', 'boss8.png', 'boss9.png', 'boss10.png',
                     'boss11.png', 'boss12.png', 'boss13.png', 'boss14.png', 'boss15.png',
                     'boss16.png', 'boss17.png', 'boss18.png', 'boss19.png', 'boss20.png']
        };
        
        // ===================== 常量定义 =====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_WIDTH = canvas.width;
        const CANVAS_HEIGHT = canvas.height;
        const FPS = 60;
        const FRAME_TIME = 1000 / FPS;

        // ===================== 技能系统 (新增地雷技能) =====================
        const SKILL_TYPES = {
            BULLET_SPLIT: { 
                id: 'BULLET_SPLIT', name: '弹幕分裂', description: '手枪发射的子弹数量+1', levelDesc: '当前: %level%/5', maxLevel: 5, iconColor: '#FFEB3B', icon: '弹', isEvolution: true 
            },
            FIRE_RATE: { 
                id: 'FIRE_RATE', name: '射速超频', description: '手枪射击间隔减少10%', levelDesc: '当前: %level%/5 (50%)', maxLevel: 5, iconColor: '#FF9800', icon: '速', isEvolution: true 
            },
            AUTO_TURRET: { id: 'AUTO_TURRET', name: '自动炮台', description: '生成固定炮台，自动攻击范围内的敌人', levelDesc: '每级+1个炮台', maxLevel: 5, iconColor: '#4CAF50', icon: '炮' },
            THORN_AURA: { id: 'THORN_AURA', name: '荆棘光环', description: '角色周围生成伤害光圈', levelDesc: '每级+范围+伤害', maxLevel: 5, iconColor: '#9C27B0', icon: '环' },
            LIFE_STEAL: { id: 'LIFE_STEAL', name: '生命偷取', description: '击杀敌人恢复生命值', levelDesc: '每级+0.5点恢复', maxLevel: 5, iconColor: '#E91E63', icon: '血' },
            BULLET_PIERCE: { id: 'BULLET_PIERCE', name: '贯穿弹', description: '子弹可穿透敌人', levelDesc: '每级+1穿透', maxLevel: 5, iconColor: '#00BCD4', icon: '穿' },
            DAMAGE_BOOST: { id: 'DAMAGE_BOOST', name: '精准射击', description: '增加所有伤害', levelDesc: '每级+25%伤害', maxLevel: 5, iconColor: '#F44336', icon: '力' },
            MOVEMENT_SPEED: { id: 'MOVEMENT_SPEED', name: '疾风步', description: '提升移动速度', levelDesc: '每级+15%移速', maxLevel: 5, iconColor: '#76FF03', icon: '风' },
            MAGNETIC_FIELD: { id: 'MAGNETIC_FIELD', name: '磁力领域', description: '增加经验球吸引范围', levelDesc: '每级+50%范围', maxLevel: 5, iconColor: '#AA00FF', icon: '磁' },
            ENERGY_SHIELD: { id: 'ENERGY_SHIELD', name: '能量护盾', description: '每30秒获得一个护盾', levelDesc: '每级-5秒冷却', maxLevel: 5, iconColor: '#00E5FF', icon: '盾' },
            CRITICAL_STRIKE: { id: 'CRITICAL_STRIKE', name: '致命一击', description: '概率造成双倍伤害', levelDesc: '每级+10%暴击率', maxLevel: 5, iconColor: '#FF1744', icon: '暴' },
            HEAL_ON_LEVEL: { id: 'HEAL_ON_LEVEL', name: '升级回血', description: '升级时恢复满血并+1上限', levelDesc: '稳健之选', maxLevel: 5, iconColor: '#69F0AE', icon: '愈' },
            MAX_HEALTH: { id: 'MAX_HEALTH', name: '强壮体魄', description: '直接增加最大生命值', levelDesc: '每级+3点上限', maxLevel: 5, iconColor: '#8D6E63', icon: '体' },
            // 新增：地雷技能
            LAND_MINE: { id: 'LAND_MINE', name: '诡雷阵地', description: '自动在脚下放置地雷，3秒后爆炸造成范围伤害', levelDesc: '每级+伤害+爆炸范围', maxLevel: 5, iconColor: '#FF5722', icon: '雷' }
        };

        // ===================== 关卡配置 =====================
        function generateLevels() {
            const levels = {};
            // 20个新BOSS的类型池
            const bossPool = ['MOLTEN_GOLEM', 'STORM_WRAITH', 'VENOM_MOTHER', 'CYBER_GOLEM', 'FLAME_LORD',
                              'ICE_QUEEN', 'SHADOW_ASSASSIN', 'BEAM_WIZARD', 'GRAVITY_MASTER', 'PLAGUE_BEARER',
                              'DRONE_MASTER', 'FLAME_CANNON', 'TIDAL_WAVE', 'SANDSTORM', 'VOID_WALKER',
                              'BLOOD_HOUND', 'IRON_MAIDEN', 'NANO_SWARM', 'SOLAR_FLARE', 'DARK_MATTER'];
            
            for (let i = 1; i <= 25; i++) {
                levels[i] = {
                    name: `第${i}关`,
                    killTarget: 20 + i * 8,
                    enemyStats: {
                        normal: { health: 3 + i * 1.2, damage: Math.floor(1 + i/4), speed: Math.min(1.2 + i * 0.08, 5.0) },
                        ranged: { health: Math.floor((3 + i * 1.2) * 0.7), damage: Math.floor(1 + i/4), speed: Math.min((1.2 + i * 0.08) * 0.8, 3.5) },
                        elite: { health: Math.floor((3 + i * 1.2) * 2.0), damage: Math.floor(2 + i/3), speed: Math.min((1.2 + i * 0.08) * 1.3, 5.5) },
                        suicide: { health: 2 + i * 0.5, damage: 2, speed: Math.min(2.5 + i * 0.1, 6.0) } // 新增：自爆怪
                    },
                    bossType: i <= 4 ? ['BARRAGE', 'JUMP', 'CHARGE', 'FINAL'][i-1] : bossPool[(i-5) % bossPool.length],
                    maxEnemyCount: 8 + Math.floor(i/2),
                    spawnRate: Math.max(300, 1600 - i * 50),
                    unlockElite: i >= 3,
                    unlockSuicide: i >= 2 // 第2关开始出现自爆怪
                };
            }
            return levels;
        }
        const LEVEL_CONFIG = generateLevels();

        // ===================== 超级BOSS配置 (20个新BOSS + 4个经典) =====================
        const BOSS_CONFIG = {
            // 经典保留款 (已增强)
            BARRAGE: { name: '弹幕统领', maxHealth: 200, damage: 3, speed: 1.2, radius: 40, color: '#FF5722', skills: ['BARRAGE_CIRCLE', 'SPIRAL_SHOT'], aggroTime: 2000 },
            JUMP: { name: '飞天巨兽', maxHealth: 400, damage: 6, speed: 1.0, radius: 50, color: '#795548', skills: ['JUMP_STOMP', 'QUAKE'], aggroTime: 2000 },
            CHARGE: { name: '狂怒巨兽', maxHealth: 350, damage: 5, speed: 2.0, radius: 45, color: '#F44336', skills: ['RUSH_CHARGE', 'FRENZY'], aggroTime: 2000 },
            FINAL: { name: '终焉主宰', maxHealth: 800, damage: 8, speed: 1.5, radius: 55, color: '#000000', skills: ['BARRAGE_CIRCLE', 'VOID_RIFT'], aggroTime: 2000 },
            
            // --- 新增20个BOSS ---
            MOLTEN_GOLEM: { name: '熔岩巨人', maxHealth: 300, damage: 4, speed: 0.8, radius: 45, color: '#FF4500', skills: ['LAVA_POOL', 'METEOR'], aggroTime: 2000 },
            STORM_WRAITH: { name: '风暴幽魂', maxHealth: 250, damage: 3, speed: 2.5, radius: 35, color: '#00CED1', skills: ['LIGHTNING_CHAIN', 'TORNADO'], aggroTime: 2000 },
            VENOM_MOTHER: { name: '蛛毒女皇', maxHealth: 280, damage: 2, speed: 1.5, radius: 40, color: '#9400D3', skills: ['POISON_SPRAY', 'WEB_SHOT'], aggroTime: 2000 },
            CYBER_GOLEM: { name: '赛博金刚', maxHealth: 450, damage: 5, speed: 0.6, radius: 50, color: '#4169E1', skills: ['LASER_SWEEP', 'MISSILE_BARRAGE'], aggroTime: 2000 },
            FLAME_LORD: { name: '炎魔领主', maxHealth: 320, damage: 4, speed: 1.2, radius: 42, color: '#FF6347', skills: ['INFERNO', 'FIRE_WALL'], aggroTime: 2000 },
            ICE_QUEEN: { name: '冰霜女王', maxHealth: 290, damage: 3, speed: 1.4, radius: 38, color: '#E0FFFF', skills: ['BLIZZARD', 'ICE_SPIKE'], aggroTime: 2000 },
            SHADOW_ASSASSIN: { name: '暗影刺客', maxHealth: 220, damage: 7, speed: 3.0, radius: 30, color: '#2F4F4F', skills: ['TELEPORT', 'BACKSTAB'], aggroTime: 2000 },
            BEAM_WIZARD: { name: '光束魔导', maxHealth: 260, damage: 5, speed: 1.0, radius: 36, color: '#9932CC', skills: ['BEAM_ARRAY', 'PRISMATIC_RAY'], aggroTime: 2000 },
            GRAVITY_MASTER: { name: '重力大师', maxHealth: 340, damage: 3, speed: 1.1, radius: 44, color: '#4B0082', skills: ['GRAVITY_WELL', 'REPULSE'], aggroTime: 2000 },
            PLAGUE_BEARER: { name: '瘟疫使者', maxHealth: 310, damage: 2, speed: 1.3, radius: 41, color: '#556B2F', skills: ['PLAGUE_CLOUD', 'INFECT'], aggroTime: 2000 },
            DRONE_MASTER: { name: '无人机母巢', maxHealth: 270, damage: 2, speed: 0.9, radius: 43, color: '#708090', skills: ['DRONE_SWARM', 'EMP_BLAST'], aggroTime: 2000 },
            FLAME_CANNON: { name: '烈焰炮台', maxHealth: 380, damage: 6, speed: 0.5, radius: 48, color: '#B22222', skills: ['HEAT_SEEKER', 'MAGMA_BLAST'], aggroTime: 2000 },
            TIDAL_WAVE: { name: '潮汐领主', maxHealth: 300, damage: 4, speed: 1.6, radius: 39, color: '#1E90FF', skills: ['TSUNAMI', 'WATER_JET'], aggroTime: 2000 },
            SANDSTORM: { name: '沙暴暴君', maxHealth: 330, damage: 3, speed: 1.8, radius: 46, color: '#D2691E', skills: ['SANDSTORM', 'QUICKSAND'], aggroTime: 2000 },
            VOID_WALKER: { name: '虚空行者', maxHealth: 280, damage: 5, speed: 2.2, radius: 37, color: '#483D8B', skills: ['VOID_DASH', 'DIMENSION_RIFT'], aggroTime: 2000 },
            BLOOD_HOUND: { name: '嗜血猎犬', maxHealth: 240, damage: 6, speed: 2.8, radius: 34, color: '#8B0000', skills: ['BLOOD_RUSH', 'FRENZIED_BITE'], aggroTime: 2000 },
            IRON_MAIDEN: { name: '铁处女', maxHealth: 400, damage: 4, speed: 0.7, radius: 47, color: '#696969', skills: ['SPIKE_SHIELD', 'IRON_MAIDEN'], aggroTime: 2000 },
            NANO_SWARM: { name: '纳米虫群', maxHealth: 260, damage: 2, speed: 2.0, radius: 33, color: '#32CD32', skills: ['SWARM', 'NANO_DISASSEMBLE'], aggroTime: 2000 },
            SOLAR_FLARE: { name: '太阳耀斑', maxHealth: 350, damage: 5, speed: 1.0, radius: 49, color: '#FFD700', skills: ['SOLAR_STRIKE', 'FLARE_BURST'], aggroTime: 2000 },
            DARK_MATTER: { name: '暗物质核心', maxHealth: 500, damage: 7, speed: 0.8, radius: 52, color: '#1a1a2e', skills: ['BLACK_HOLE', 'EVAPORATE'], aggroTime: 2000 }
        };

        // ===================== 游戏状态变量 =====================
        const keys = {};
        const mouse = { x: CANVAS_WIDTH/2, y: CANVAS_HEIGHT/2, left: false };
        let gameState = 'START';
        let currentLevel = 1;
        let levelProgress = 0;
        let kills = 0;
        let isPaused = false;
        let isBossActive = false;
        let levelComplete = false;
        let waitingForBoss = false;
        
        let playerExp = 0;
        let playerLevel = 1;
        let expToNextLevel = 10;
        let isChoosingSkill = false;
        let skillChoices = [];
        let skillCountdown = 0;
        let skillCountdownTimer = null;
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let drops = [];
        let expOrbs = [];
        let turrets = [];
        let mines = []; // 新增：地雷数组
        let explosions = [];
        let bossBombs = [];
        const MAX_ENEMY_BULLETS = 450;
        const MAX_EXPLOSIONS = 60;
        const MAX_BOSS_BOMBS = 24;
        
        let lastFrameTime = 0;
        let lastEnemySpawn = 0;
        let lastShotTime = 0;
        let lastMineDrop = 0; // 新增：地雷放置计时
        let accumulator = 0;

        let playerShield = false;
        let shieldCooldown = 0;

        // ===================== 玩家对象 (移除翻滚相关) =====================
        const player = {
            x: CANVAS_WIDTH / 2,
            y: CANVAS_HEIGHT / 2,
            radius: 15,
            baseSpeed: 3, // 固定速度
            color: '#4CAF50',
            maxHealth: 10,
            health: 10,
            invincible: 0,
            evolution: {
                bulletCount: 1,
                fireRateBoost: 0
            },
            baseFireRate: 200,
            skills: {},
            skillCooldowns: {}
        };

        // ===================== 工具函数 =====================
        function getDistance(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }
        function getDistanceSq(x1, y1, x2, y2) { return (x2 - x1) ** 2 + (y2 - y1) ** 2; }
        function random(min, max) { return Math.random() * (max - min) + min; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function pushExplosion(exp) {
            explosions.push(exp);
            if (explosions.length > MAX_EXPLOSIONS) explosions.splice(0, explosions.length - MAX_EXPLOSIONS);
        }
        function pushEnemyBullet(bullet) {
            if (enemyBullets.length >= MAX_ENEMY_BULLETS) return;
            enemyBullets.push(bullet);
        }
        function showFloatText(text, x, y, color = '#fff') {
            const el = document.createElement('div');
            el.className = 'floatText';
            el.textContent = text;
            el.style.left = (x + canvas.getBoundingClientRect().left) + 'px';
            el.style.top = (y + canvas.getBoundingClientRect().top) + 'px';
            el.style.color = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        function showLevelNotice(text, duration = 3000) {
            const notice = document.getElementById('levelNotice');
            notice.textContent = text;
            notice.style.opacity = 1;
            setTimeout(() => { notice.style.opacity = 0; }, duration);
        }

        // ===================== 射击系统 =====================
        function shoot(timestamp) {
            let fireRate = player.baseFireRate * (1 - (player.evolution.fireRateBoost * 0.1));
            if (timestamp - lastShotTime < fireRate) return;
            lastShotTime = timestamp;

            const baseAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            
            let baseDmg = 1;
            if (player.skills.DAMAGE_BOOST) baseDmg *= (1 + player.skills.DAMAGE_BOOST.level * 0.25);
            
            let isCrit = false;
            if (player.skills.CRITICAL_STRIKE && Math.random() < player.skills.CRITICAL_STRIKE.level * 0.1) {
                baseDmg *= 2;
                isCrit = true;
            }

            let pierceCount = player.skills.BULLET_PIERCE ? player.skills.BULLET_PIERCE.level : 0;
            const bulletCount = player.evolution.bulletCount;
            const spreadAngle = 0.15;

            for (let i = 0; i < bulletCount; i++) {
                let angleOffset = 0;
                if (bulletCount > 1) angleOffset = (i - (bulletCount - 1) / 2) * spreadAngle;
                const angle = baseAngle + angleOffset;

                bullets.push({
                    x: player.x, y: player.y,
                    vx: Math.cos(angle) * 10,
                    vy: Math.sin(angle) * 10,
                    radius: 4,
                    color: isCrit ? '#FF0000' : '#FFD700',
                    damage: baseDmg,
                    pierceLeft: pierceCount
                });
            }
        }

        function updateEvolutionUI() {
            document.getElementById('evoBullets').textContent = `${player.evolution.bulletCount} / 5`;
            document.getElementById('evoSpeed').textContent = `${player.evolution.fireRateBoost * 10}%`;
        }

        // ===================== 经验与技能系统 =====================
        function gainExp(amount, x, y) {
            expOrbs.push({ x: x, y: y, amount: amount, radius: 5, speed: 3 });
        }
        function checkLevelUp() {
            while (playerExp >= expToNextLevel) {
                playerExp -= expToNextLevel;
                playerLevel++;
                expToNextLevel = Math.floor(expToNextLevel * 1.4);
                
                if (player.skills.HEAL_ON_LEVEL) {
                    player.maxHealth += 1;
                    player.health = player.maxHealth;
                    updateHealthUI();
                }
                
                triggerSkillSelection();
            }
            updateExpUI();
        }
        function triggerSkillSelection() {
            isPaused = true;
            isChoosingSkill = true;
            skillCountdown = 10;

            const allSkills = Object.values(SKILL_TYPES);
            const availableSkills = [];
            for (const skill of allSkills) {
                const currentLevel = player.skills[skill.id]?.level || 0;
                if (skill.id === 'BULLET_SPLIT' && player.evolution.bulletCount >= 5) continue;
                if (skill.id === 'FIRE_RATE' && player.evolution.fireRateBoost >= 5) continue;
                if (currentLevel < skill.maxLevel) {
                    availableSkills.push(skill);
                }
            }

            skillChoices = [];
            for (let i = 0; i < 3; i++) {
                if (availableSkills.length === 0) break;
                const randomIndex = Math.floor(Math.random() * availableSkills.length);
                skillChoices.push(availableSkills.splice(randomIndex, 1)[0]);
            }

            if (skillChoices.length === 0) {
                isPaused = false;
                isChoosingSkill = false;
                return;
            }

            renderSkillCards();
            document.getElementById('skillSelectModal').style.display = 'flex';

            clearInterval(skillCountdownTimer);
            skillCountdownTimer = setInterval(() => {
                skillCountdown--;
                document.getElementById('skillCountdown').textContent = `${skillCountdown}秒后自动随机选择`;
                if (skillCountdown <= 0) {
                    const randomSkill = skillChoices[Math.floor(Math.random() * skillChoices.length)];
                    selectSkill(randomSkill.id);
                }
            }, 1000);
        }
        function renderSkillCards() {
            const container = document.getElementById('skillCards');
            container.innerHTML = '';
            skillChoices.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'skillCard';
                card.innerHTML = `
                    <div class="skillCardIcon" style="background-color: ${skill.iconColor}">${skill.icon}</div>
                    <div class="skillCardName" style="color: ${skill.iconColor}">${skill.name}</div>
                    <div class="skillCardDesc">${skill.description}</div>
                `;
                card.onclick = () => selectSkill(skill.id);
                container.appendChild(card);
            });
        }
        function selectSkill(skillId) {
            if (!isChoosingSkill) return;

            if (skillId === 'BULLET_SPLIT') {
                player.evolution.bulletCount++;
                updateEvolutionUI();
            } else if (skillId === 'FIRE_RATE') {
                player.evolution.fireRateBoost++;
                updateEvolutionUI();
            } else {
                if (!player.skills[skillId]) {
                    player.skills[skillId] = { id: skillId, level: 1, ...SKILL_TYPES[skillId] };
                    if (skillId === 'AUTO_TURRET') spawnTurret();
                    if (skillId === 'ENERGY_SHIELD') playerShield = true;
                    if (skillId === 'MAX_HEALTH') { player.maxHealth += 3; player.health += 3; updateHealthUI(); }
                } else {
                    player.skills[skillId].level++;
                    if (skillId === 'AUTO_TURRET') spawnTurret();
                    if (skillId === 'MAX_HEALTH') { player.maxHealth += 3; player.health += 3; updateHealthUI(); }
                }
            }

            clearInterval(skillCountdownTimer);
            document.getElementById('skillSelectModal').style.display = 'none';
            isPaused = false;
            isChoosingSkill = false;
            skillChoices = [];
            updateSkillIconsUI();
        }

        function spawnTurret() {
            turrets.push({ x: player.x + random(-100, 100), y: player.y + random(-100, 100), radius: 20, damage: 1, range: 300, cooldown: 1000, lastShot: 0 });
        }

        // ===================== 新增：地雷系统 =====================
        function updateMines(deltaTime, timestamp) {
            if (player.skills.LAND_MINE) {
                // 每3秒放一个雷
                if (timestamp - lastMineDrop > 3000) {
                    lastMineDrop = timestamp;
                    mines.push({
                        x: player.x,
                        y: player.y,
                        radius: 10,
                        timer: 3000, // 3秒后爆炸
                        damage: 3 + player.skills.LAND_MINE.level * 2,
                        range: 60 + player.skills.LAND_MINE.level * 20,
                        color: '#FF5722'
                    });
                }
            }

            // 更新地雷计时
            for (let i = mines.length - 1; i >= 0; i--) {
                const mine = mines[i];
                mine.timer -= deltaTime;
                if (mine.timer > 0) continue;

                // 爆炸！
                pushExplosion({ x: mine.x, y: mine.y, radius: 0, maxRadius: mine.range, alpha: 1, growth: 7, fade: 0.05, color: '255,100,0', ring: false });

                // 对范围内敌人造成伤害
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const hitRadius = mine.range + enemy.radius;
                    if (getDistanceSq(mine.x, mine.y, enemy.x, enemy.y) < hitRadius * hitRadius) {
                        enemy.health -= mine.damage;
                        if (enemy.health <= 0 && !enemy.isBoss) {
                            killEnemy(enemy);
                        }
                    }
                }

                mines.splice(i, 1);
            }
        }

        function updateSkills(deltaTime, timestamp) {
            const skills = player.skills;

            if (skills.AUTO_TURRET) {
                turrets.forEach(turret => {
                    let target = null;
                    let minDistSq = turret.range * turret.range;
                    enemies.forEach(enemy => {
                        const distSq = getDistanceSq(turret.x, turret.y, enemy.x, enemy.y);
                        if (distSq < minDistSq) { minDistSq = distSq; target = enemy; }
                    });
                    if (target && timestamp - turret.lastShot > 1000) {
                        turret.lastShot = timestamp;
                        const angle = Math.atan2(target.y - turret.y, target.x - turret.x);
                        bullets.push({ x: turret.x, y: turret.y, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8, radius: 4, color: '#4CAF50', damage: 1, pierceLeft: 0 });
                    }
                });
            }

            if (skills.THORN_AURA) {
                const range = 100 + (skills.THORN_AURA.level - 1) * 20;
                const damage = 0.5 * skills.THORN_AURA.level * (deltaTime / 1000);
                enemies.forEach(enemy => {
                    const hitRadius = range + enemy.radius;
                    if (getDistanceSq(player.x, player.y, enemy.x, enemy.y) < hitRadius * hitRadius) {
                        enemy.health -= damage;
                        if (enemy.health <= 0 && !enemy.isBoss) killEnemy(enemy);
                    }
                });
            }

            if (skills.ENERGY_SHIELD) {
                if (!playerShield) {
                    shieldCooldown -= deltaTime;
                    if (shieldCooldown <= 0) {
                        playerShield = true;
                        showFloatText('护盾恢复!', player.x, player.y, '#00E5FF');
                    }
                }
            }
        }

        function updateExpOrbs() {
            let magnetRange = 100;
            if (player.skills.MAGNETIC_FIELD) magnetRange *= (1 + player.skills.MAGNETIC_FIELD.level * 0.5);

            for (let i = expOrbs.length - 1; i >= 0; i--) {
                const orb = expOrbs[i];
                const dist = getDistance(orb.x, orb.y, player.x, player.y);
                
                if (dist < magnetRange) {
                    const dx = player.x - orb.x;
                    const dy = player.y - orb.y;
                    orb.x += (dx / dist) * orb.speed * 3;
                    orb.y += (dy / dist) * orb.speed * 3;
                }
                if (dist < player.radius + orb.radius) {
                    playerExp += orb.amount;
                    expOrbs.splice(i, 1);
                    checkLevelUp();
                }
            }
        }
        function updateExpUI() {
            const progress = Math.min((playerExp / expToNextLevel) * 100, 100);
            document.getElementById('expBar').style.width = progress + '%';
            document.getElementById('expText').textContent = `等级: ${playerLevel} | 经验: ${playerExp} / ${expToNextLevel}`;
        }
        function updateSkillIconsUI() {
            const container = document.getElementById('skillIcons');
            container.innerHTML = '';
            for (const [id, skill] of Object.entries(player.skills)) {
                const icon = document.createElement('div');
                icon.className = 'skillIcon';
                icon.style.backgroundColor = skill.iconColor;
                let displayIcon = skill.icon;
                if (id === 'ENERGY_SHIELD') displayIcon = playerShield ? '盾' : '充';
                icon.innerHTML = `${displayIcon}<div class="skillLevel">${skill.level}</div>`;
                container.appendChild(icon);
            }
        }

        // ===================== 怪物与关卡系统 (新增自爆怪) =====================
        function spawnEnemy(timestamp) {
            if (isBossActive || levelComplete || waitingForBoss || enemies.length >= LEVEL_CONFIG[currentLevel].maxEnemyCount) return;
            
            const spawnInterval = LEVEL_CONFIG[currentLevel].spawnRate;
            if (timestamp - lastEnemySpawn < spawnInterval) return;
            lastEnemySpawn = timestamp;

            let x, y;
            const side = Math.floor(Math.random() * 4);
            switch (side) {
                case 0: x = Math.random() * CANVAS_WIDTH; y = -50; break;
                case 1: x = CANVAS_WIDTH + 50; y = Math.random() * CANVAS_HEIGHT; break;
                case 2: x = Math.random() * CANVAS_WIDTH; y = CANVAS_HEIGHT + 50; break;
                case 3: x = -50; y = Math.random() * CANVAS_HEIGHT; break;
            }

            const levelConfig = LEVEL_CONFIG[currentLevel];
            const roll = Math.random();
            let enemyType = 'normal';
            
            // 概率分配
            if (levelConfig.unlockSuicide && roll > 0.85) enemyType = 'suicide'; // 15% 自爆怪
            else if (levelConfig.unlockElite && roll > 0.9) enemyType = 'elite';
            else if (roll > 0.7) enemyType = 'ranged';

            const stats = levelConfig.enemyStats[enemyType];
            const enemyConfig = {
                normal: { radius: 16, color: '#f44336', isRanged: false, exp: 1 },
                ranged: { radius: 14, color: '#FF9800', isRanged: true, exp: 2 },
                elite: { radius: 22, color: '#9C27B0', isRanged: false, exp: 5 },
                suicide: { radius: 12, color: '#FFFF00', isRanged: false, exp: 1, isSuicide: true } // 新增自爆属性
            };

            enemies.push({
                x: x, y: y, ...stats, ...enemyConfig[enemyType],
                maxHealth: stats.health, type: enemyType, lastAttack: 0
            });
        }
        
        function updateEnemies(deltaTime, timestamp) {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];

                if (enemy.isBoss && (enemy.isPreparingStomp || enemy.isChargeAiming || enemy.isChargeWarning || enemy.isCharging)) {
                    continue;
                }

                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const distSq = dx * dx + dy * dy;
                const dist = distSq > 0 ? Math.sqrt(distSq) : 0;

                if (enemy.isRanged) {
                    if (dist > 300) {
                        if (dist > 0) { enemy.x += (dx / dist) * enemy.speed; enemy.y += (dy / dist) * enemy.speed; }
                    } else if (dist < 200) {
                        if (dist > 0) { enemy.x -= (dx / dist) * enemy.speed; enemy.y -= (dy / dist) * enemy.speed; }
                    }
                    if (timestamp - enemy.lastAttack > 2000) {
                        enemy.lastAttack = timestamp;
                        const angle = Math.atan2(dy, dx);
                        pushEnemyBullet({ x: enemy.x, y: enemy.y, vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5, radius: 6, color: '#FF5722', damage: enemy.damage });
                    }
                } else {
                    // 近战或自爆怪：直接冲脸
                    if (dist > 0) {
                        enemy.x += (dx / dist) * enemy.speed;
                        enemy.y += (dy / dist) * enemy.speed;
                    }
                }
                enemy.x = clamp(enemy.x, enemy.radius, CANVAS_WIDTH - enemy.radius);
                enemy.y = clamp(enemy.y, enemy.radius, CANVAS_HEIGHT - enemy.radius);
            }
        }

        function killEnemy(enemy) {
            if (Math.random() < 0.1) {
                drops.push({ x: enemy.x, y: enemy.y, type: 'HEALTH_PACK', radius: 15, life: 6000 });
            }
            
            gainExp(enemy.exp, enemy.x, enemy.y);
            
            if (player.skills.LIFE_STEAL) {
                const healAmount = 0.5 * player.skills.LIFE_STEAL.level;
                player.health = Math.min(player.maxHealth, player.health + healAmount);
                updateHealthUI();
            }

            const index = enemies.indexOf(enemy);
            if (index > -1) enemies.splice(index, 1);
            kills++;
            levelProgress++;
            document.getElementById('kills').textContent = kills;

            if (levelProgress >= LEVEL_CONFIG[currentLevel].killTarget && !isBossActive && !waitingForBoss) {
                waitingForBoss = true;
                showLevelNotice('清理残敌，准备BOSS战！', 3000);
            }
            
            if (waitingForBoss && enemies.length === 0 && !isBossActive) {
                waitingForBoss = false;
                spawnBOSS();
            }
        }
        
        function spawnBOSS() {
            isBossActive = true;
            const bossType = LEVEL_CONFIG[currentLevel].bossType;
            const bossConfig = BOSS_CONFIG[bossType];
            
            // 确保BOSS配置存在
            if (!bossConfig) {
                console.error("Missing boss config for:", bossType);
                // 随便给一个默认的防止报错
                const defaultBoss = BOSS_CONFIG['BARRAGE'];
                enemies.push({...defaultBoss, x: CANVAS_WIDTH/2, y: 100, isBoss: true, type: 'boss', spawnTime: performance.now(), lastSkill: 0, skillCooldown: 4000, isPreparingStomp: false, stompTimer: 0, stompTarget: null, stompFlash: 0, isChargeAiming: false, chargeAimTimer: 0, isChargeWarning: false, chargeWarningTimer: 0, isCharging: false, chargeAngle: 0, chargeDirX: 0, chargeDirY: 0, chargeDistanceLeft: 0});
                return;
            }

            const scaledHealth = bossConfig.maxHealth * (1 + (currentLevel-1) * 0.5); // 血量倍率提升

            enemies.push({
                x: CANVAS_WIDTH / 2, y: 100,
                ...bossConfig,
                health: scaledHealth,
                maxHealth: scaledHealth,
                isBoss: true, type: 'boss',
                spawnTime: performance.now(),
                lastSkill: 0, skillCooldown: 3500, // 技能释放更频繁
                isJumping: false, jumpTimer: 0, jumpTarget: null,
                isPreparingStomp: false, stompTimer: 0, stompDuration: 0, stompTarget: null, stompFlash: 0,
                isChargeAiming: false, chargeAimTimer: 0, isChargeWarning: false, chargeWarningTimer: 0,
                isCharging: false, chargeAngle: 0, chargeDirX: 0, chargeDirY: 0, chargeDistanceLeft: 0
            });
            showLevelNotice(`BOSS出现！${bossConfig.name}`);
        }
        
        // ===================== 超级BOSS技能系统 =====================
        function updateBossSkills(boss, timestamp) {
            // 开局沉默时间 (aggroTime)
            if (timestamp - boss.spawnTime < (boss.aggroTime || 2000)) return;
            if (boss.isPreparingStomp || boss.isChargeAiming || boss.isChargeWarning || boss.isCharging) return;

            if (timestamp - boss.lastSkill < boss.skillCooldown) return;
            boss.lastSkill = timestamp;

            // 随机选择一个技能释放
            const skill = boss.skills[Math.floor(Math.random() * boss.skills.length)];

            // --- 技能库 ---
            switch(skill) {
                // 经典技能
                case 'BARRAGE_CIRCLE':
                    for (let i = 0; i < 36; i++) {
                        const bulletAngle = (i * 10) * Math.PI / 180;
                        pushEnemyBullet({ x: boss.x, y: boss.y, vx: Math.cos(bulletAngle) * 6, vy: Math.sin(bulletAngle) * 6, radius: 5, color: boss.color, damage: boss.damage });
                    }
                    break;
                case 'SPIRAL_SHOT':
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            if (gameState !== 'PLAYING') return;
                            for (let j = 0; j < 12; j++) {
                                const angle = (j * 30 + (timestamp / 100 % 360)) * Math.PI / 180;
                                pushEnemyBullet({ x: boss.x, y: boss.y, vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5, radius: 4, color: boss.color, damage: boss.damage });
                            }
                        }, i * 300);
                    }
                    break;
                case 'JUMP_STOMP':
                    boss.isPreparingStomp = true;
                    boss.stompDuration = 1500;
                    boss.stompTimer = boss.stompDuration;
                    boss.stompRadius = 200;
                    boss.stompFlash = 0;
                    boss.stompTarget = {
                        x: clamp(player.x, boss.radius, CANVAS_WIDTH - boss.radius),
                        y: clamp(player.y, boss.radius, CANVAS_HEIGHT - boss.radius)
                    };
                    break;
                case 'QUAKE':
                    // 飞天巨兽改为定时炸弹阵，逼迫玩家走位
                    for (let i = 0; i < 5; i++) {
                        if (bossBombs.length >= MAX_BOSS_BOMBS) break;
                        const angle = (Math.PI * 2 / 5) * i + random(-0.25, 0.25);
                        const distance = random(90, 230);
                        const tx = clamp(player.x + Math.cos(angle) * distance, 60, CANVAS_WIDTH - 60);
                        const ty = clamp(player.y + Math.sin(angle) * distance, 60, CANVAS_HEIGHT - 60);
                        bossBombs.push({
                            x: tx,
                            y: ty,
                            timer: 1500 + i * 120,
                            radius: 16,
                            blastRadius: 100,
                            damage: Math.max(2, Math.floor(boss.damage * 1.2))
                        });
                    }
                    break;
                case 'RUSH_CHARGE':
                    // 锁定方向，不追踪
                    boss.chargeAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
                    boss.chargeDirX = Math.cos(boss.chargeAngle);
                    boss.chargeDirY = Math.sin(boss.chargeAngle);
                    boss.chargeDistanceLeft = 480;
                    boss.chargeSpeed = 17;
                    boss.isChargeAiming = true;
                    boss.chargeAimTimer = 700;
                    boss.isChargeWarning = false;
                    boss.isCharging = false;
                    break;
                case 'FRENZY':
                    if (!boss.frenzyApplied) {
                        boss.speed *= 1.4;
                        boss.frenzyApplied = true;
                    }
                    boss.frenzyUntil = timestamp + 5000;
                    break;
                case 'VOID_RIFT':
                    // 在玩家周围开几个洞
                    for(let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            if (gameState !== 'PLAYING') return;
                            const rx = player.x + random(-150, 150);
                            const ry = player.y + random(-150, 150);
                            // 生成追踪弹
                            for(let j = 0; j < 5; j++) {
                                pushEnemyBullet({ x: rx, y: ry, vx: 0, vy: 0, radius: 6, color: '#800080', damage: boss.damage, isHoming: true, life: 3000 });
                            }
                        }, i * 500);
                    }
                    break;
                // 新增：熔岩巨人技能
                case 'LAVA_POOL':
                    // 留个扩展位，简单起见用弹幕代替
                    for(let i = 0; i < 5; i++) {
                        const tx = random(100, CANVAS_WIDTH-100);
                        const ty = random(100, CANVAS_HEIGHT-100);
                        // 生成一个长时间存在的伤害区域（用慢速移动的子弹模拟）
                        pushEnemyBullet({ x: tx, y: ty, vx: 0, vy: 0, radius: 40, color: 'rgba(255,69,0,0.5)', damage: boss.damage, life: 5000 });
                    }
                    break;
                case 'METEOR':
                    for(let i = 0; i < 5; i++) {
                        setTimeout(() => {
                            if (gameState !== 'PLAYING') return;
                            const angle = Math.atan2(player.y - boss.y, player.x - boss.x) + random(-0.5, 0.5);
                            pushEnemyBullet({ x: boss.x, y: boss.y, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8, radius: 12, color: '#FF4500', damage: boss.damage+1 });
                        }, i * 200);
                    }
                    break;
                // 风暴幽魂 & 其他通用复杂技能就不一一实现了，用不同的弹幕模式代替
                // 这里主要展示架构，所有BOSS都会用不同的弹幕组合
                default:
                    // 默认随机弹幕
                    for (let i = 0; i < 20; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        pushEnemyBullet({ x: boss.x, y: boss.y, vx: Math.cos(angle)*5, vy: Math.sin(angle)*5, radius: 5, color: boss.color, damage: boss.damage });
                    }
            }
        }

        function resolveStompImpact(boss) {
            boss.isPreparingStomp = false;
            const center = boss.stompTarget || { x: boss.x, y: boss.y };
            const radius = boss.stompRadius || 200;
            const hitRadius = radius + player.radius;

            if (getDistanceSq(player.x, player.y, center.x, center.y) < hitRadius * hitRadius) {
                damagePlayer(boss.damage * 2);
            }

            pushExplosion({ x: center.x, y: center.y, radius: 0, maxRadius: radius * 0.7, alpha: 1, growth: 7, fade: 0.03, color: '255,140,40', ring: true, lineWidth: 4 });
            pushExplosion({ x: center.x, y: center.y, radius: 12, maxRadius: radius, alpha: 0.75, growth: 9, fade: 0.035, color: '255,90,40', ring: true, lineWidth: 3 });
            pushExplosion({ x: center.x, y: center.y, radius: 24, maxRadius: radius + 40, alpha: 0.55, growth: 11, fade: 0.04, color: '255,60,20', ring: true, lineWidth: 2 });
        }

        function updateBossBombs(deltaTime) {
            for (let i = bossBombs.length - 1; i >= 0; i--) {
                const bomb = bossBombs[i];
                bomb.timer -= deltaTime;
                if (bomb.timer > 0) continue;

                const hitRadius = bomb.blastRadius + player.radius;
                if (getDistanceSq(player.x, player.y, bomb.x, bomb.y) < hitRadius * hitRadius) {
                    damagePlayer(bomb.damage);
                }

                pushExplosion({ x: bomb.x, y: bomb.y, radius: 0, maxRadius: bomb.blastRadius, alpha: 1, growth: 8, fade: 0.035, color: '255,80,30', ring: true, lineWidth: 3 });
                pushExplosion({ x: bomb.x, y: bomb.y, radius: 10, maxRadius: bomb.blastRadius + 25, alpha: 0.6, growth: 10, fade: 0.05, color: '255,120,60', ring: true, lineWidth: 2 });

                bossBombs.splice(i, 1);
            }
        }

        function updateBossStates(deltaTime, timestamp) {
            const frameScale = deltaTime / FRAME_TIME;

            enemies.forEach(boss => {
                if (!boss.isBoss) return;

                if (boss.frenzyApplied && boss.frenzyUntil && timestamp >= boss.frenzyUntil) {
                    boss.speed /= 1.4;
                    boss.frenzyApplied = false;
                    boss.frenzyUntil = 0;
                }

                if (boss.isPreparingStomp) {
                    boss.stompTimer -= deltaTime;
                    if (boss.stompTimer <= 220 && boss.stompFlash <= 0) {
                        boss.stompFlash = 180;
                        if (boss.stompTarget) {
                            boss.x = boss.stompTarget.x;
                            boss.y = boss.stompTarget.y;
                        }
                    }
                    if (boss.stompFlash > 0) boss.stompFlash -= deltaTime;
                    if (boss.stompTimer <= 0) resolveStompImpact(boss);
                    return;
                }

                if (boss.isChargeAiming) {
                    boss.chargeAimTimer -= deltaTime;
                    if (boss.chargeAimTimer <= 0) {
                        boss.isChargeAiming = false;
                        boss.isChargeWarning = true;
                        boss.chargeWarningTimer = 420;
                    }
                    return;
                }

                if (boss.isChargeWarning) {
                    boss.chargeWarningTimer -= deltaTime;
                    if (boss.chargeWarningTimer <= 0) {
                        boss.isChargeWarning = false;
                        boss.isCharging = true;
                    }
                    return;
                }

                if (boss.isCharging) {
                    const step = (boss.chargeSpeed || 17) * frameScale;
                    boss.x += boss.chargeDirX * step;
                    boss.y += boss.chargeDirY * step;
                    boss.chargeDistanceLeft -= step;

                    const hitRadius = boss.radius + player.radius;
                    if (getDistanceSq(boss.x, boss.y, player.x, player.y) < hitRadius * hitRadius) {
                        damagePlayer(Math.ceil(boss.damage * 1.2));
                    }

                    const minX = boss.radius;
                    const maxX = CANVAS_WIDTH - boss.radius;
                    const minY = boss.radius;
                    const maxY = CANVAS_HEIGHT - boss.radius;
                    if (boss.x <= minX || boss.x >= maxX || boss.y <= minY || boss.y >= maxY || boss.chargeDistanceLeft <= 0) {
                        boss.x = clamp(boss.x, minX, maxX);
                        boss.y = clamp(boss.y, minY, maxY);
                        boss.isCharging = false;
                    }
                }
            });
        }

        function renderBossTelegraphs(timestamp) {
            enemies.forEach(boss => {
                if (!boss.isBoss) return;

                if (boss.isPreparingStomp && boss.stompTarget) {
                    const progress = 1 - (boss.stompTimer / Math.max(1, boss.stompDuration || 1500));
                    const pulse = 0.2 + Math.sin(timestamp / 90) * 0.08;
                    const radius = boss.stompRadius || 200;

                    ctx.beginPath();
                    ctx.arc(boss.stompTarget.x, boss.stompTarget.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 20, 20, ${0.08 + progress * 0.18 + pulse})`;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(boss.stompTarget.x, boss.stompTarget.y, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 80, 80, 0.95)';
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    if (boss.stompFlash > 0) {
                        const flashAlpha = Math.min(1, boss.stompFlash / 180);
                        ctx.beginPath();
                        ctx.arc(boss.stompTarget.x, boss.stompTarget.y, radius * (0.92 + flashAlpha * 0.08), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                        ctx.lineWidth = 6;
                        ctx.stroke();
                    }
                }

                if (boss.isChargeWarning || boss.isCharging) {
                    const length = Math.max(140, boss.chargeDistanceLeft || 480);
                    const width = boss.radius * (boss.isCharging ? 1.8 : 2.2);
                    const alpha = boss.isCharging ? 0.12 : 0.26 + Math.sin(timestamp / 65) * 0.05;

                    ctx.save();
                    ctx.translate(boss.x, boss.y);
                    ctx.rotate(boss.chargeAngle || 0);
                    ctx.fillStyle = `rgba(255, 0, 0, ${alpha})`;
                    ctx.fillRect(0, -width / 2, length, width);
                    ctx.strokeStyle = 'rgba(255, 110, 110, 0.95)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(0, -width / 2, length, width);
                    ctx.restore();
                }
            });

            bossBombs.forEach(bomb => {
                const blinkFast = bomb.timer < 700;
                const blink = blinkFast ? (Math.floor(bomb.timer / 80) % 2 === 0) : (Math.floor(bomb.timer / 150) % 2 === 0);
                const fill = blink ? 'rgba(255, 60, 60, 0.9)' : 'rgba(180, 40, 40, 0.8)';

                ctx.beginPath();
                ctx.arc(bomb.x, bomb.y, bomb.radius, 0, Math.PI * 2);
                ctx.fillStyle = fill;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(bomb.x, bomb.y, bomb.blastRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 70, 70, 0.85)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function enterNextLevel() {
            currentLevel++;
            if (currentLevel > 25) {
                gameState = 'CLEAR';
                return;
            }
            levelProgress = 0; levelComplete = false; isBossActive = false; waitingForBoss = false;
            enemies = []; enemyBullets = []; drops = []; mines = []; bossBombs = []; lastEnemySpawn = 0;
            document.getElementById('levelInfo').textContent = `第${currentLevel}关`;
            document.getElementById('killTarget').textContent = LEVEL_CONFIG[currentLevel].killTarget;
            showLevelNotice(`第${currentLevel}关`);
        }

        // ===================== 碰撞与伤害 (修改自爆怪逻辑) =====================
        function damagePlayer(amount) {
            if (player.invincible > 0) return;

            if (playerShield) {
                playerShield = false;
                shieldCooldown = 30000;
                showFloatText('护盾破碎!', player.x, player.y, '#00E5FF');
                return;
            }

            player.health -= amount;
            player.invincible = 30;
            updateHealthUI();
            showFloatText(`-${amount}`, player.x, player.y - 30, '#FF0000');

            if (player.health <= 0) {
                gameState = 'GAME_OVER';
            }
        }
        
        function updateHealthUI() {
            const progress = Math.max(0, (player.health / player.maxHealth) * 100);
            document.getElementById('healthBar').style.width = progress + '%';
            document.getElementById('healthText').textContent = `${player.health} / ${player.maxHealth}`;
        }

        function updateBullets(deltaTime) {
            if (enemyBullets.length > MAX_ENEMY_BULLETS) enemyBullets.splice(0, enemyBullets.length - MAX_ENEMY_BULLETS);
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx; b.y += b.vy;
                if (b.x < 0 || b.x > CANVAS_WIDTH || b.y < 0 || b.y > CANVAS_HEIGHT) bullets.splice(i, 1);
            }
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                
                // 特殊子弹逻辑
                if (b.isHoming) {
                    const angle = Math.atan2(player.y - b.y, player.x - b.x);
                    b.vx += Math.cos(angle) * 0.2;
                    b.vy += Math.sin(angle) * 0.2;
                    // 限速
                    const speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
                    if(speed > 6) { b.vx = (b.vx/speed)*6; b.vy = (b.vy/speed)*6; }
                }
                
                if (b.life !== undefined) {
                    b.life -= deltaTime;
                    if (b.life <= 0) { enemyBullets.splice(i, 1); continue; }
                }
                
                // 只有有速度的才移动，或者是固定陷阱
                if (b.vx !== undefined) {
                    b.x += b.vx; 
                    b.y += b.vy;
                }
                
                if (b.x < -50 || b.x > CANVAS_WIDTH+50 || b.y < -50 || b.y > CANVAS_HEIGHT+50) {
                    if (!b.life) enemyBullets.splice(i, 1); // 陷阱类不因为出界删除
                }
            }
        }

        function checkCollisions(timestamp) {
            // 玩家子弹打敌人
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const hitRadius = bullet.radius + enemy.radius;
                    if (getDistanceSq(bullet.x, bullet.y, enemy.x, enemy.y) >= hitRadius * hitRadius) continue;

                    enemy.health -= bullet.damage;

                    if (enemy.health <= 0) {
                        if (enemy.isBoss) {
                            enemies.splice(j, 1);
                            isBossActive = false;
                            levelComplete = true;
                            showLevelNotice(`通关！`);
                            setTimeout(() => { if (gameState === 'PLAYING') enterNextLevel(); }, 3000);
                        } else {
                            killEnemy(enemy);
                        }
                    }

                    if (bullet.pierceLeft > 0) bullet.pierceLeft--;
                    else bullets.splice(i, 1);
                    break;
                }
            }

            // 敌人子弹打玩家
            if (player.invincible <= 0) {
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const bullet = enemyBullets[i];
                    const hitRadius = bullet.radius + player.radius;
                    if (getDistanceSq(bullet.x, bullet.y, player.x, player.y) < hitRadius * hitRadius) {
                        damagePlayer(bullet.damage);
                        // 只有不是陷阱类的才删除
                        if (bullet.life === undefined) enemyBullets.splice(i, 1);
                        else if (bullet.radius < 20) enemyBullets.splice(i, 1); // 小的碰撞物删除，大的池子保留
                    }
                }
            }

            // 敌人碰撞玩家
            if (player.invincible <= 0) {
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    const hitRadius = enemy.radius + player.radius;
                    if (getDistanceSq(enemy.x, enemy.y, player.x, player.y) < hitRadius * hitRadius) {
                        if (enemy.isSuicide) {
                            // 自爆怪：直接造成2点伤害并消失
                            damagePlayer(2);
                            pushExplosion({ x: enemy.x, y: enemy.y, radius: 0, maxRadius: 50, alpha: 1, growth: 6, fade: 0.06, color: '255,255,80', ring: false });
                            enemies.splice(i, 1);
                        } else {
                            damagePlayer(enemy.damage);
                        }
                    }
                }
            }

            // 拾取物品
            for (let i = drops.length - 1; i >= 0; i--) {
                const drop = drops[i];
                const hitRadius = drop.radius + player.radius;
                if (getDistanceSq(drop.x, drop.y, player.x, player.y) < hitRadius * hitRadius) {
                    if (drop.type === 'HEALTH_PACK') {
                        player.health = player.maxHealth;
                        updateHealthUI();
                        showFloatText('满血！', player.x, player.y, '#00FF00');
                    }
                    drops.splice(i, 1);
                }
            }
        }

        // ===================== 玩家更新 (移除翻滚和加速) =====================
        function updatePlayer(deltaTime, timestamp) {
            if (player.invincible > 0) player.invincible--;

            let dx = 0, dy = 0;
            if (keys['w']) dy -= 1; if (keys['s']) dy += 1;
            if (keys['a']) dx -= 1; if (keys['d']) dx += 1;
            if (dx !== 0 || dy !== 0) { const len = Math.sqrt(dx * dx + dy * dy); dx /= len; dy /= len; }

            let speedMod = 1.0;
            if (player.skills.MOVEMENT_SPEED) speedMod = 1 + player.skills.MOVEMENT_SPEED.level * 0.15;

            // 只有基础速度
            const speed = player.baseSpeed * speedMod;
            player.x += dx * speed;
            player.y += dy * speed;

            player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(CANVAS_HEIGHT - player.radius, player.y));
            if (mouse.left) shoot(timestamp);
        }

        // ===================== 渲染函数 =====================
        function render(deltaTime) {
            // 背景
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.strokeStyle = '#3a3a3a';
            ctx.lineWidth = 1;
            for (let x = 0; x < CANVAS_WIDTH; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_HEIGHT); ctx.stroke(); }
            for (let y = 0; y < CANVAS_HEIGHT; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_WIDTH, y); ctx.stroke(); }

            if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center';
                ctx.fillText('游戏结束', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 80);
                ctx.font = '24px Arial';
                ctx.fillText(`最终击杀: ${kills} | 到达: 第${currentLevel}关`, CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 20);
                
                // 绘制重新开始按钮 (简单的文字按钮，点击检测在loop里做)
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(CANVAS_WIDTH/2 - 100, CANVAS_HEIGHT/2 + 20, 200, 60);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.fillText('重新开始', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 58);
                return;
            }
            if (gameState === 'CLEAR') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#FFD700'; ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center';
                ctx.fillText('恭喜通关！', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 40);
                return;
            }

            // 渲染爆炸效果
            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                exp.radius += exp.growth || 5;
                exp.alpha -= exp.fade || 0.05;
                if (exp.alpha <= 0 || exp.radius >= (exp.maxRadius || 9999)) { explosions.splice(i, 1); continue; }

                ctx.beginPath();
                ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                const rgb = exp.color || '255, 100, 0';
                if (exp.ring) {
                    ctx.strokeStyle = `rgba(${rgb}, ${exp.alpha})`;
                    ctx.lineWidth = exp.lineWidth || 3;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = `rgba(${rgb}, ${exp.alpha})`;
                    ctx.fill();
                }
            }

            // 光环
            if (player.skills.THORN_AURA) {
                const range = 100 + (player.skills.THORN_AURA.level - 1) * 20;
                ctx.strokeStyle = 'rgba(156, 39, 176, 0.5)';
                ctx.beginPath(); ctx.arc(player.x, player.y, range, 0, Math.PI * 2); ctx.stroke();
            }

            // 地雷
            mines.forEach(mine => {
                ctx.fillStyle = mine.timer < 1000 ? (Math.floor(mine.timer/100) % 2 === 0 ? '#FF0000' : '#FF5722') : mine.color;
                ctx.beginPath(); ctx.arc(mine.x, mine.y, mine.radius, 0, Math.PI * 2); ctx.fill();
                // 显示倒计时圈
                ctx.strokeStyle = '#fff';
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, mine.radius + 3, -Math.PI/2, -Math.PI/2 + (1 - mine.timer/3000) * Math.PI * 2);
                ctx.stroke();
            });

            // 炮台
            turrets.forEach(turret => { 
                ctx.fillStyle = '#4CAF50'; ctx.beginPath(); ctx.arc(turret.x, turret.y, turret.radius, 0, Math.PI * 2); ctx.fill(); 
            });
            
            // 经验球
            expOrbs.forEach(orb => { 
                ctx.fillStyle = '#42a5f5'; ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2); ctx.fill(); 
            });
            
            // 掉落物
            drops.forEach(drop => {
                if (drop.life !== undefined) { drop.life -= 16.67; if (drop.life < 2000 && Math.floor(drop.life / 100) % 2 === 0) return; }
                if (drop.type === 'HEALTH_PACK') {
                    ctx.fillStyle = '#E91E63'; ctx.fillRect(drop.x - 10, drop.y - 10, 20, 20);
                    ctx.fillStyle = '#fff'; ctx.fillRect(drop.x - 6, drop.y - 2, 12, 4); ctx.fillRect(drop.x - 2, drop.y - 6, 4, 12);
                }
            });

            renderBossTelegraphs(performance.now());

            // 敌人
            enemies.forEach(enemy => {

                ctx.fillStyle = enemy.color; 
                ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2); ctx.fill();

                // 血条
                if (enemy.health < enemy.maxHealth) {
                    const barWidth = enemy.radius * 2;
                    ctx.fillStyle = '#555'; ctx.fillRect(enemy.x - barWidth/2, enemy.y - enemy.radius - 10, barWidth, 4);
                    ctx.fillStyle = enemy.isBoss ? '#FFD700' : '#00ff00';
                    ctx.fillRect(enemy.x - barWidth/2, enemy.y - enemy.radius - 10, barWidth * (enemy.health / enemy.maxHealth), 4);
                }
                if (enemy.isBoss) { 
                    ctx.fillStyle = '#fff'; ctx.font = '14px Arial'; ctx.textAlign = 'center'; 
                    ctx.fillText(enemy.name, enemy.x, enemy.y - enemy.radius - 20); 
                }
            });
            
            // 子弹
            bullets.forEach(bullet => { 
                ctx.fillStyle = bullet.color; 
                ctx.beginPath(); ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2); ctx.fill(); 
            });
            enemyBullets.forEach(bullet => { 
                ctx.fillStyle = bullet.color; 
                // 如果是半透明颜色，需要注意globalAlpha，但这里简单处理
                ctx.beginPath(); ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2); ctx.fill(); 
            });

            // 玩家
            if (!(player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0)) {
                if (playerShield) {
                    ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius + 5, 0, Math.PI * 2); ctx.stroke();
                }

                ctx.fillStyle = player.color;
                ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();

                // 枪线
                const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
                ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(player.x + Math.cos(angle) * 25, player.y + Math.sin(angle) * 25); ctx.stroke();
            }
        }

        // ===================== 游戏重置函数 =====================
        function resetGame() {
            // 重置所有状态
            gameState = 'PLAYING';
            currentLevel = 1;
            levelProgress = 0;
            kills = 0;
            isPaused = false;
            isBossActive = false;
            levelComplete = false;
            waitingForBoss = false;
            
            playerExp = 0;
            playerLevel = 1;
            expToNextLevel = 10;
            isChoosingSkill = false;
            
            bullets = [];
            enemyBullets = [];
            enemies = [];
            drops = [];
            expOrbs = [];
            turrets = [];
            mines = [];
            explosions = [];
            bossBombs = [];
            
            player.x = CANVAS_WIDTH / 2;
            player.y = CANVAS_HEIGHT / 2;
            player.health = 10;
            player.maxHealth = 10;
            player.invincible = 0;
            player.evolution.bulletCount = 1;
            player.evolution.fireRateBoost = 0;
            player.skills = {};
            playerShield = false;
            
            document.getElementById('kills').textContent = '0';
            document.getElementById('levelInfo').textContent = '第1关';
            document.getElementById('killTarget').textContent = LEVEL_CONFIG[1].killTarget;
            
            updateHealthUI();
            updateExpUI();
            updateEvolutionUI();
            updateSkillIconsUI();
            showLevelNotice('第1关');
        }

        // ===================== 游戏主循环 =====================
        function gameLoop(timestamp) {
            if (gameState === 'START') {
                requestAnimationFrame(gameLoop);
                return;
            }

            const frameTime = timestamp - lastFrameTime;
            lastFrameTime = timestamp;
            const deltaTime = Math.min(frameTime, 1000); 
            accumulator += deltaTime;

            while (accumulator >= FRAME_TIME) {
                if (!isPaused && gameState === 'PLAYING') {
                    updatePlayer(FRAME_TIME, timestamp);
                    spawnEnemy(timestamp);
                    updateEnemies(FRAME_TIME, timestamp);
                    enemies.forEach(enemy => { if (enemy.isBoss) updateBossSkills(enemy, timestamp); });
                    updateBossStates(FRAME_TIME, timestamp);
                    updateBossBombs(FRAME_TIME);
                    updateSkills(FRAME_TIME, timestamp);
                    updateMines(FRAME_TIME, timestamp); // 新增地雷更新
                    updateExpOrbs();
                    updateBullets(FRAME_TIME); // 传deltaTime
                    checkCollisions(timestamp);
                }
                accumulator -= FRAME_TIME;
            }

            render(deltaTime);
            requestAnimationFrame(gameLoop);
        }

        // ===================== 事件监听与启动 =====================
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
        canvas.addEventListener('mousemove', (e) => { const rect = canvas.getBoundingClientRect(); mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top; });
        canvas.addEventListener('mousedown', (e) => { 
            if (e.button === 0) {
                mouse.left = true; 
                // 游戏结束时的点击检测
                if (gameState === 'GAME_OVER') {
                    const rect = canvas.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const clickY = e.clientY - rect.top;
                    if (clickX > CANVAS_WIDTH/2 - 100 && clickX < CANVAS_WIDTH/2 + 100 &&
                        clickY > CANVAS_HEIGHT/2 + 20 && clickY < CANVAS_HEIGHT/2 + 80) {
                        resetGame();
                    }
                }
            }
        });
        canvas.addEventListener('mouseup', (e) => { if (e.button === 0) mouse.left = false; });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // 启动
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            resetGame(); // 用重置代替直接启动
            lastFrameTime = performance.now();
            requestAnimationFrame(gameLoop);
        });

        // 初始绘制
        render(0);
        updateHealthUI();
        updateExpUI();
    </script>
</body>
</html>
